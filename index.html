<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta ADSO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="card">
        <img src="assets/img/buenaslolas.jpg" alt="Imagen ADSO" class="card__image">

        <div class="card__content">
            <h2 class="card__title">Aprendices ADSO</h2>

            <p class="card__description">
                Los aprendices de ADSO están al día con 1.
            </p>
        </div>

        <div class="card__actions">
            <button class="card__button card__button--primary">
                Aceptar
            </button>

            <button class="card__button card__button--secondary">
                Cancelar
            </button>
        </div>

    </div>

</body>
</html>
