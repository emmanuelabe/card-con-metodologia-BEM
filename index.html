<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSO PRIME</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Fondo animado -->

        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <!-- Card -->
    <div class="card">

        <img
            src="assets/img/buenaslolas.jpg"
            alt="ADSO PRIME"
            class="card__image"
        >

        <div class="card__content">

            <h2 class="card__title">
                ADSO PRIME
            </h2>

            <div class="card__divider"></div>

            <p class="card__description">
                Formación especializada en análisis y desarrollo de software,
                orientada a la creación de soluciones innovadoras, desarrollo
                web, bases de datos y transformación digital.
            </p>

        </div>

        <div class="card__actions">

            <button class="card__button card__button--primary">
                Aceptar
            </button>

            <button class="card__button card__button--secondary">
                Cancelar
            </button>

        </div>

        <div class="card__contact">

            <h3 class="card__contact-title">
                CONTACTO
            </h3>

            <div class="contact__item">
                📧 emmanuelabe77033@gmail.com
            </div>

            <div class="contact__item">
                📱 313 529 7359
            </div>

            <div class="socials">

                <a href="#" class="social__icon" title="GitHub">
                    🐙

                <a href="#" class="social__icon" title="Instagram">
                    📷
                </a>

                <a href="mailto:emmanuelabe77033@gmail.com" class="social__icon" title="Correo">

                </a>

            </div>

        </div>

    </div>

</body>
</html>
